<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livingstone College — GED 110 Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #003087;
      --blue-light: #0a4db5;
      --gold:       #c9a84c;
      --gold-light: #f0c96e;
      --gold-pale:  #fdf6e3;
      --bg:         #f7f4ee;
      --bg-card:    #ffffff;
      --text:       #1a1a18;
      --text-sec:   #5f5e5a;
      --border:     rgba(0,0,0,0.10);
      --success-bg: #eaf3de;
      --success-tx: #3b6d11;
      --success-br: rgba(59,109,17,0.3);
      --danger-bg:  #fcebeb;
      --danger-tx:  #a32d2d;
      --danger-br:  rgba(163,45,45,0.3);
      --radius:     10px;
      --radius-lg:  16px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #12110e;
        --bg-card:   #1e1c17;
        --text:      #f0ede8;
        --text-sec:  #a8a49e;
        --border:    rgba(255,255,255,0.10);
        --gold-pale: #2a2310;
        --success-bg:#172c09;
        --success-tx:#97c459;
        --danger-bg: #3a1212;
        --danger-tx: #f09595;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0 1rem 3rem;
    }

    #app { width: 100%; max-width: 660px; }

    /* HERO */
    .hero {
      background: var(--blue);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 2rem 1.5rem 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content:''; position:absolute;
      top:-30px; right:-30px;
      width:160px; height:160px;
      border-radius:50%;
      border:2px solid rgba(201,168,76,0.2);
    }
    .hero::after {
      content:''; position:absolute;
      bottom:-40px; left:-20px;
      width:120px; height:120px;
      border-radius:50%;
      border:2px solid rgba(201,168,76,0.12);
    }
    .hero-badge {
      display:inline-block;
      background:var(--gold);
      color:var(--blue);
      font-size:11px; font-weight:700;
      letter-spacing:0.06em;
      padding:3px 10px; border-radius:20px;
      margin-bottom:10px;
    }
    .hero h1 { font-size:22px; font-weight:700; color:#fff; line-height:1.3; }
    .hero p  { font-size:13px; color:rgba(255,255,255,0.6); margin-top:4px; }

    /* STRIPE */
    .lc-stripe {
      height:3px;
      background:linear-gradient(90deg, var(--blue) 50%, var(--gold) 50%);
      border-radius:2px;
      margin-bottom:1.5rem;
    }

    /* STATS */
    .stats {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:8px; margin-bottom:1.25rem;
    }
    .stat {
      background:var(--bg-card);
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      padding:0.75rem; text-align:center;
      transition:transform 0.2s;
    }
    .stat:hover { transform:translateY(-2px); }
    .stat-val { font-size:22px; font-weight:700; }
    .stat-lbl { font-size:11px; color:var(--text-sec); margin-top:2px; }

    /* TABS */
    .mode-tabs { display:flex; gap:8px; margin-bottom:1.25rem; }
    .tab {
      flex:1; padding:9px;
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      background:var(--bg-card);
      cursor:pointer; font-size:13px;
      color:var(--text-sec); font-family:var(--font);
      transition:all 0.2s;
    }
    .tab:hover { border-color:var(--gold); color:var(--gold); }
    .tab.active {
      background:var(--blue); color:var(--gold-light);
      border-color:var(--blue); font-weight:600;
    }

    /* PROGRESS */
    .progress-wrap { margin-bottom:1.25rem; }
    .progress-label {
      display:flex; justify-content:space-between;
      font-size:11px; color:var(--text-sec); margin-bottom:5px;
    }
    .progress-bar {
      height:6px; background:var(--border);
      border-radius:3px; overflow:hidden;
    }
    .progress-fill {
      height:100%;
      background:linear-gradient(90deg, var(--blue), var(--gold));
      border-radius:3px;
      transition:width 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    /* ANIMATIONS */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    @keyframes popIn  {
      0%{transform:scale(0.95);} 60%{transform:scale(1.03);} 100%{transform:scale(1);}
    }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-6px);}
      40%{transform:translateX(6px);}
      60%{transform:translateX(-4px);}
      80%{transform:translateX(4px);}
    }
    @keyframes scoreIn {
      from{opacity:0;transform:scale(0.92) translateY(12px);}
      to  {opacity:1;transform:scale(1) translateY(0);}
    }

    /* QUESTION CARD */
    .qcard {
      background:var(--bg-card);
      border:0.5px solid var(--border);
      border-top:3px solid var(--blue);
      border-radius:var(--radius-lg);
      padding:1.5rem; margin-bottom:1rem;
      animation:slideUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    .qnum {
      font-size:11px; color:var(--gold);
      font-weight:700; letter-spacing:0.06em; margin-bottom:8px;
    }
    .qtext { font-size:16px; font-weight:600; line-height:1.5; }

    /* MC OPTIONS */
    .mc-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:1rem; }
    .mc-btn {
      padding:11px 13px;
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      background:var(--bg-card);
      cursor:pointer; font-size:13px;
      color:var(--text); text-align:left;
      line-height:1.4; font-family:var(--font);
      transition:background 0.15s, transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    }
    .mc-btn:hover:not(:disabled) {
      background:var(--gold-pale); border-color:var(--gold);
      transform:translateY(-1px);
      box-shadow:0 2px 8px rgba(201,168,76,0.15);
    }
    .mc-btn:active:not(:disabled) { transform:scale(0.97); }
    .mc-btn:disabled { cursor:default; }
    .mc-btn.correct {
      background:var(--success-bg); color:var(--success-tx);
      border-color:var(--success-br);
      animation:popIn 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .mc-btn.wrong {
      background:var(--danger-bg); color:var(--danger-tx);
      border-color:var(--danger-br);
      animation:shake 0.35s ease;
    }
    .mc-btn.reveal {
      background:var(--success-bg); color:var(--success-tx);
      border-color:var(--success-br); opacity:0.6;
    }
    .explanation {
      margin-top:0.75rem; font-size:13px; color:var(--text-sec);
      border-top:0.5px solid var(--border); padding-top:0.75rem;
      line-height:1.5; animation:fadeIn 0.3s ease;
    }

    /* NAV */
    .nav-row { display:flex; gap:8px; align-items:center; }
    .nav-btn {
      padding:9px 20px;
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      background:var(--bg-card);
      cursor:pointer; font-size:13px;
      color:var(--text); font-family:var(--font);
      transition:all 0.15s;
    }
    .nav-btn:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
    .nav-btn:disabled { opacity:0.3; cursor:default; }
    .nav-btn:disabled:hover { background:var(--bg-card); color:var(--text); border-color:var(--border); }
    .nav-info { flex:1; text-align:center; font-size:13px; color:var(--text-sec); }

    /* FLASHCARD */
    .fc-card {
      background:var(--bg-card);
      border:0.5px solid var(--border);
      border-top:3px solid var(--gold);
      border-radius:var(--radius-lg);
      padding:2rem; margin-bottom:1rem;
      min-height:180px; display:flex;
      flex-direction:column; justify-content:center;
      cursor:pointer;
      transition:box-shadow 0.2s, transform 0.2s;
      animation:slideUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    .fc-card:hover { box-shadow:0 4px 16px rgba(0,48,135,0.08); transform:translateY(-2px); }
    .fc-answer {
      font-size:14px; color:var(--text-sec);
      margin-top:1rem; padding-top:1rem;
      border-top:0.5px solid var(--border);
      line-height:1.6; display:none;
      animation:fadeIn 0.3s ease;
    }
    .fc-answer.show { display:block; }
    .fc-hint { font-size:12px; color:var(--gold); margin-top:0.75rem; text-align:center; }
    .fc-mark { display:flex; gap:8px; margin-bottom:1rem; }
    .fc-mark button {
      flex:1; padding:10px;
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      background:var(--bg-card);
      cursor:pointer; font-size:13px;
      font-weight:500; font-family:var(--font);
      transition:all 0.15s;
    }
    .btn-got  { color:var(--success-tx)!important; border-color:var(--success-br)!important; }
    .btn-got:hover  { background:var(--success-bg)!important; }
    .btn-miss { color:var(--danger-tx)!important; border-color:var(--danger-br)!important; }
    .btn-miss:hover { background:var(--danger-bg)!important; }

    /* BROWSE */
    .browse-item {
      background:var(--bg-card);
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      padding:0.9rem 1rem; display:flex; gap:10px;
      margin-bottom:8px;
      animation:slideUp 0.3s ease both;
      transition:border-color 0.15s;
    }
    .browse-item:hover { border-color:var(--gold); }
    .browse-num { font-size:11px; color:var(--gold); font-weight:700; min-width:22px; padding-top:2px; }
    .browse-q { font-size:14px; font-weight:500; line-height:1.4; margin-bottom:3px; }
    .browse-a { font-size:13px; color:var(--text-sec); }

    /* RESULTS */
    .results-wrap { animation:scoreIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }

    .speedometer-wrap {
      background:var(--blue);
      border-radius:var(--radius-lg);
      padding:2rem 1.5rem 1.25rem;
      margin-bottom:1rem;
      text-align:center;
    }
    .speed-title {
      font-size:11px; color:rgba(255,255,255,0.55);
      letter-spacing:0.08em; font-weight:600; margin-bottom:1rem;
    }
    .speed-canvas-wrap { display:flex; justify-content:center; }

    .score-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:8px; margin-bottom:1rem;
    }
    .score-tile {
      background:var(--bg-card);
      border:0.5px solid var(--border);
      border-radius:var(--radius);
      padding:1rem; text-align:center;
    }
    .score-tile-val { font-size:26px; font-weight:700; }
    .score-tile-lbl { font-size:11px; color:var(--text-sec); margin-top:3px; }

    .analysis-card {
      background:var(--bg-card);
      border:0.5px solid var(--border);
      border-left:3px solid var(--blue);
      border-radius:var(--radius-lg);
      padding:1.25rem; margin-bottom:1rem;
    }
    .analysis-title {
      font-size:13px; font-weight:700;
      color:var(--blue); margin-bottom:1rem;
      padding-bottom:0.5rem;
      border-bottom:0.5px solid var(--border);
      display:flex; align-items:center; gap:6px;
    }
    .wrong-item {
      padding:0.75rem 0;
      border-bottom:0.5px solid var(--border);
      animation:slideUp 0.3s ease both;
    }
    .wrong-item:last-child { border-bottom:none; padding-bottom:0; }
    .wrong-q  { font-size:13px; font-weight:500; margin-bottom:4px; }
    .wrong-yours   { font-size:12px; color:var(--danger-tx); margin-bottom:2px; }
    .wrong-correct { font-size:12px; color:var(--success-tx); }

    .restart-btn {
      width:100%; padding:13px;
      background:var(--blue); color:var(--gold-light);
      border:none; border-radius:var(--radius);
      cursor:pointer; font-size:14px;
      font-weight:700; font-family:var(--font);
      letter-spacing:0.03em;
      transition:background 0.2s, transform 0.1s;
    }
    .restart-btn:hover { background:var(--blue-light); }
    .restart-btn:active { transform:scale(0.98); }

    .share-bar {
      margin-top:1.5rem; font-size:11px;
      color:var(--text-sec); text-align:center;
    }

    @media (max-width:480px) {
      .mc-options { grid-template-columns:1fr; }
      .stats { grid-template-columns:repeat(2,1fr); }
      .score-grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>
<div id="app">

  <div class="hero">
    <div class="hero-badge">GED 110 · SPRING 2026</div>
    <h1>Livingstone College<br>Final Exam Quiz</h1>
    <p>25 questions · Multiple choice · Flashcards · Score analysis</p>
  </div>

  <div class="lc-stripe"></div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">25</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" id="s-correct" style="color:var(--success-tx)">0</div><div class="stat-lbl">Correct</div></div>
    <div class="stat"><div class="stat-val" id="s-wrong" style="color:var(--danger-tx)">0</div><div class="stat-lbl">Wrong</div></div>
    <div class="stat"><div class="stat-val" id="s-pct">—</div><div class="stat-lbl">Score</div></div>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="setMode('mc',this)">Multiple Choice</button>
    <button class="tab" onclick="setMode('fc',this)">Flashcards</button>
    <button class="tab" onclick="setMode('browse',this)">Browse All</button>
  </div>

  <div id="main"></div>

  <div class="share-bar">Made by Samuel · Livingstone College GED 110 · Spring 2026</div>
</div>

<script>
const QA=[
  {n:1, q:"What religious organization supports Livingstone College?",
   a:"African Methodist Episcopal (AME) Zion Church",
   decoys:["National Baptist Convention","United Methodist Church","Church of God in Christ"]},
  {n:2, q:"What was the original name of Livingstone College?",
   a:"Zion Wesley Institute",
   decoys:["Salisbury Negro Institute","Livingstone Seminary","Hood Theological College"]},
  {n:3, q:"On what date was Livingstone College founded?",
   a:"February 5, 1879",
   decoys:["March 12, 1881","January 15, 1876","February 5, 1882"]},
  {n:4, q:"Who was the first president of Livingstone College?",
   a:"Dr. Joseph Charles Price",
   decoys:["Dr. William H. Goler","Bishop J.W. Hood","Dr. William J. Trent"]},
  {n:5, q:"Who was David Livingstone?",
   a:"A missionary, philanthropist, and explorer who mapped vast parts of Africa",
   decoys:["A British general who colonized West Africa","A Scottish physician and founder of Liberia","An abolitionist politician who funded Black colleges"]},
  {n:6, q:"How many acres did Livingstone College's original Delta Grove site consist of?",
   a:"40 acres",
   decoys:["272 acres","100 acres","15 acres"]},
  {n:7, q:"How much did the city of Salisbury donate to help relocate the college?",
   a:"$1,000",
   decoys:["$40,000","$10,000","$5,000"]},
  {n:8, q:"Who was the first editor of the Living-Stone newspaper?",
   a:"C.B.A. Johnson",
   decoys:["W.F. Fonvielle","J.E.K. Aggrey","William H. Goler"]},
  {n:9, q:"What organization accredits Livingstone College?",
   a:"SACSCOC",
   decoys:["AACSB","HLC (Higher Learning Commission)","MSCHE"]},
  {n:10,q:"Before relocating, in which city and state was Livingstone College first located?",
   a:"Concord, NC",
   decoys:["Charlotte, NC","Greensboro, NC","Durham, NC"]},
  {n:11,q:"Who directed the construction of Dodge Hall?",
   a:"William H. Goler",
   decoys:["Joseph Charles Price","Bishop C.R. Harris","J.E.K. Aggrey"]},
  {n:12,q:"How many residence halls does Livingstone College have?",
   a:"9 residence halls",
   decoys:["6 residence halls","12 residence halls","4 residence halls"]},
  {n:13,q:"Who is ultimately responsible for making sure you receive a proper education?",
   a:"The student",
   decoys:["The professor","The college administration","Your academic advisor"]},
  {n:14,q:"Which of the following is NOT one of Livingstone College's program areas?",
   a:"Pre-Law",
   decoys:["Business Administration","Culinary Arts","Criminal Justice"]},
  {n:15,q:"Who was the first student to attend Livingstone College?",
   a:"Charity Elizabeth Williams",
   decoys:["Annie C. Tucker","Mary Jane Hood","Sarah Elizabeth Price"]},
  {n:16,q:"Besides 'Reminiscences of College Days,' what is W.F. Fonvielle remembered for authoring?",
   a:"My Livingstone",
   decoys:["The Zion Legacy","Black College Rising","Sons of Salisbury"]},
  {n:17,q:"What year did the first graduation announcement go out from Livingstone?",
   a:"1883",
   decoys:["1879","1887","1881"]},
  {n:18,q:"Who was the first native African to receive an appointment at Livingstone College?",
   a:"John E.K. Aggrey",
   decoys:["Bishop J.W. Hood","David Livingstone Jr.","William H. Goler"]},
  {n:19,q:"In what year was the first Greek Fraternity established at Livingstone College?",
   a:"1893",
   decoys:["1900","1887","1873"]},
  {n:20,q:"Who served as Lady Principal of Livingstone College for ten years?",
   a:"Mrs. Annie C. Tucker",
   decoys:["Mrs. Sarah J. Price","Mrs. Elizabeth Hood","Mrs. Mary W. Trent"]},
  {n:21,q:"How old is Livingstone College as of 2026?",
   a:"147 years old",
   decoys:["132 years old","155 years old","141 years old"]},
  {n:22,q:"Who is the 13th president of Livingstone College?",
   a:"Mr. Anthony Davis",
   decoys:["Mr. William Trent Jr.","Dr. James Ghee","Dr. Jimmy Jenkins"]},
  {n:23,q:"When was the first Black intercollegiate football game played, and against whom?",
   a:"December 27, 1892 — vs. Biddle College (now Johnson C. Smith University)",
   decoys:["November 4, 1890 — vs. Howard University","December 27, 1892 — vs. Shaw University","January 3, 1895 — vs. Fisk University"]},
  {n:24,q:"How many majors does Livingstone College currently offer?",
   a:"28 majors",
   decoys:["23 majors","35 majors","19 majors"]},
  {n:25,q:"Who is the Director of the Success Center at Livingstone College?",
   a:"Holly Zacharias",
   decoys:["Annie Tucker","Michelle Goler","Sandra Price"]}
];

let mode='mc',deck=[],idx=0,correct=0,wrong=0;
let answered={},wrongLog={},fcShown=false,mcOpts=[];

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function setMode(m,el){
  mode=m;idx=0;correct=0;wrong=0;answered={};wrongLog={};fcShown=false;mcOpts=[];
  deck=shuffle([...QA]);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  updateStats();render();
}

function updateStats(){
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
  const t=correct+wrong;
  document.getElementById('s-pct').textContent=t?Math.round(correct/t*100)+'%':'—';
}

function render(){
  const el=document.getElementById('main');
  if(mode==='mc') renderMC(el);
  else if(mode==='fc') renderFC(el);
  else renderBrowse(el);
}

function buildOpts(q){
  return shuffle([{text:q.a,correct:true},...q.decoys.map(d=>({text:d,correct:false}))]);
}

function progressHTML(){
  const done=Object.keys(answered).length;
  const pct=Math.round(done/deck.length*100);
  return `<div class="progress-wrap">
    <div class="progress-label"><span>Progress</span><span>${done} / ${deck.length} answered</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function renderMC(el){
  if(idx>=deck.length){el.innerHTML=resultsHTML();drawSpeedometer();return;}
  const q=deck[idx];
  if(!mcOpts[idx]) mcOpts[idx]=buildOpts(q);
  const opts=mcOpts[idx];
  const was=answered[q.n];
  let optHTML=opts.map((o,i)=>{
    let cls='mc-btn';
    if(was!==undefined){
      if(o.correct) cls+=' reveal';
      else if(was===i) cls+=' wrong';
    }
    return `<button class="${cls}" onclick="answerMC(${i})" ${was!==undefined?'disabled':''}>${o.text}</button>`;
  }).join('');
  let expHTML='';
  if(was!==undefined){
    const gotIt=opts[was].correct;
    expHTML=`<div class="explanation">${gotIt?'✓ Correct! Well done.':'✗ Correct answer: <strong>'+opts.find(o=>o.correct).text+'</strong>'}</div>`;
  }
  el.innerHTML=`
    ${progressHTML()}
    <div class="qcard">
      <div class="qnum">QUESTION ${idx+1} OF ${deck.length}</div>
      <div class="qtext">${q.q}</div>
      <div class="mc-options">${optHTML}</div>
      ${expHTML}
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="nav(-1)" ${idx===0?'disabled':''}>← Back</button>
      <div class="nav-info">${idx+1} / ${deck.length}</div>
      <button class="nav-btn" onclick="nav(1)">Next →</button>
    </div>`;
}

function answerMC(i){
  if(answered[deck[idx].n]!==undefined) return;
  const q=deck[idx];
  const opts=mcOpts[idx];
  answered[q.n]=i;
  if(opts[i].correct){correct++;}
  else{
    wrong++;
    wrongLog[q.n]={q:q.q,yours:opts[i].text,correct:opts.find(o=>o.correct).text};
  }
  updateStats();render();
}

function nav(d){
  idx=Math.max(0,Math.min(deck.length-1,idx+d));
  fcShown=false;render();
}

function renderFC(el){
  if(idx>=deck.length){el.innerHTML=resultsHTML();drawSpeedometer();return;}
  const q=deck[idx];
  el.innerHTML=`
    ${progressHTML()}
    <div class="fc-card" onclick="revealFC()">
      <div class="qnum">QUESTION ${idx+1} OF ${deck.length}</div>
      <div class="qtext">${q.q}</div>
      <div class="fc-answer ${fcShown?'show':''}"><strong>Answer:</strong> ${q.a}</div>
      ${!fcShown?'<div class="fc-hint">Tap card to reveal answer</div>':''}
    </div>
    ${fcShown?`<div class="fc-mark">
      <button class="btn-got"  onclick="markFC('correct')">Got it ✓</button>
      <button class="btn-miss" onclick="markFC('wrong')">Missed it ✗</button>
    </div>`:''}
    <div class="nav-row">
      <button class="nav-btn" onclick="nav(-1)" ${idx===0?'disabled':''}>← Back</button>
      <div class="nav-info">${idx+1} / ${deck.length}</div>
      <button class="nav-btn" onclick="nav(1)">Next →</button>
    </div>`;
}

function revealFC(){fcShown=true;render();}

function markFC(v){
  const q=deck[idx];
  const prev=answered[q.n];
  if(prev===undefined){
    if(v==='correct') correct++;
    else{wrong++;wrongLog[q.n]={q:q.q,yours:'(not recalled)',correct:q.a};}
  } else {
    if(prev!==v){
      if(v==='correct'){correct++;wrong--;delete wrongLog[q.n];}
      else{wrong++;correct--;wrongLog[q.n]={q:q.q,yours:'(not recalled)',correct:q.a};}
    }
  }
  answered[q.n]=v;
  updateStats();
  idx=Math.min(deck.length,idx+1);
  fcShown=false;render();
}

function renderBrowse(el){
  el.innerHTML=`<div>${QA.map((q,i)=>`
    <div class="browse-item" style="animation-delay:${i*0.025}s">
      <div class="browse-num">${q.n}.</div>
      <div>
        <div class="browse-q">${q.q}</div>
        <div class="browse-a">${q.a}</div>
      </div>
    </div>`).join('')}</div>`;
}

function gradeInfo(pct){
  if(pct>=90) return {label:'Excellent — you know this cold!',color:'#3b6d11'};
  if(pct>=75) return {label:'Good — review the ones you missed.',color:'#7a5c00'};
  if(pct>=60) return {label:'Getting there — keep drilling.',color:'#854f0b'};
  return {label:'Keep practicing — repetition is the key.',color:'#a32d2d'};
}

function resultsHTML(){
  const t=correct+wrong;
  const pct=t?Math.round(correct/t*100):0;
  const grade=gradeInfo(pct);
  const wrongItems=Object.values(wrongLog);

  const wrongHTML=wrongItems.length===0
    ?`<div style="text-align:center;padding:1.25rem;font-size:13px;color:var(--success-tx);font-weight:500;">🎉 Perfect score — no wrong answers!</div>`
    :wrongItems.map((w,i)=>`
      <div class="wrong-item" style="animation-delay:${0.1+i*0.05}s">
        <div class="wrong-q">${w.q}</div>
        <div class="wrong-yours">✗ Your answer: ${w.yours}</div>
        <div class="wrong-correct">✓ Correct: ${w.correct}</div>
      </div>`).join('');

  return `<div class="results-wrap">
    <div class="speedometer-wrap">
      <div class="speed-title">FINAL SCORE</div>
      <div class="speed-canvas-wrap">
        <canvas id="speedometer" width="280" height="160"></canvas>
      </div>
      <div style="font-size:32px;font-weight:800;color:#fff;margin-top:0.5rem;letter-spacing:-0.01em;">${pct}%</div>
      <div style="font-size:14px;color:var(--gold-light);margin-top:4px;font-weight:600;">${grade.label}</div>
    </div>

    <div class="score-grid">
      <div class="score-tile">
        <div class="score-tile-val" style="color:var(--success-tx)">${correct}</div>
        <div class="score-tile-lbl">Correct</div>
      </div>
      <div class="score-tile">
        <div class="score-tile-val" style="color:var(--danger-tx)">${wrong}</div>
        <div class="score-tile-lbl">Wrong</div>
      </div>
      <div class="score-tile">
        <div class="score-tile-val">${t}</div>
        <div class="score-tile-lbl">Answered</div>
      </div>
    </div>

    <div class="analysis-card">
      <div class="analysis-title">
        <span>📋</span> Score Analysis — Questions You Missed
      </div>
      ${wrongHTML}
    </div>

    <button class="restart-btn" onclick="restart()">Try Again ↺</button>
  </div>`;
}

function drawSpeedometer(){
  const canvas=document.getElementById('speedometer');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const t=correct+wrong;
  const pct=t?Math.round(correct/t*100):0;
  const cx=140,cy=148,r=110;

  const segments=[
    {from:0,  to:60,  color:'#e24b4a'},
    {from:60, to:75,  color:'#ef9f27'},
    {from:75, to:100, color:'#63991a'},
  ];

  function drawTrack(){
    ctx.clearRect(0,0,280,160);
    segments.forEach(seg=>{
      const sa=Math.PI+(seg.from/100)*Math.PI;
      const ea=Math.PI+(seg.to/100)*Math.PI;
      ctx.beginPath();
      ctx.arc(cx,cy,r,sa,ea);
      ctx.lineWidth=22; ctx.strokeStyle=seg.color; ctx.lineCap='butt';
      ctx.stroke();
    });
    // inner ring highlight
    ctx.beginPath();
    ctx.arc(cx,cy,r-11,Math.PI,2*Math.PI);
    ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.stroke();
    // tick marks
    for(let i=0;i<=10;i++){
      const angle=Math.PI+(i/10)*Math.PI;
      const inner=r-28,outer=r-12;
      ctx.beginPath();
      ctx.moveTo(cx+inner*Math.cos(angle),cy+inner*Math.sin(angle));
      ctx.lineTo(cx+outer*Math.cos(angle),cy+outer*Math.sin(angle));
      ctx.lineWidth=i%5===0?2.5:1;
      ctx.strokeStyle='rgba(255,255,255,0.45)';
      ctx.stroke();
    }
    // zone labels
    const labels=[{v:30,txt:'Low'},{v:67,txt:'Mid'},{v:87,txt:'High'}];
    labels.forEach(l=>{
      const angle=Math.PI+(l.v/100)*Math.PI;
      const lr=r-44;
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.font='bold 9px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(l.txt,cx+lr*Math.cos(angle),cy+lr*Math.sin(angle)+3);
    });
  }

  function drawNeedle(val){
    const angle=Math.PI+(val/100)*Math.PI;
    const len=r-32;
    const nx=cx+len*Math.cos(angle),ny=cy+len*Math.sin(angle);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(nx,ny);
    ctx.lineWidth=3.5; ctx.strokeStyle='#ffffff'; ctx.lineCap='round';
    ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=6;
    ctx.stroke();
    ctx.restore();
    // center cap
    ctx.beginPath();
    ctx.arc(cx,cy,7,0,2*Math.PI);
    ctx.fillStyle='#ffffff'; ctx.fill();
    ctx.beginPath();
    ctx.arc(cx,cy,4,0,2*Math.PI);
    ctx.fillStyle='var(--blue,#003087)'; ctx.fill();
  }

  const duration=1000;
  const start=performance.now();
  function animate(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-progress,3);
    drawTrack();
    drawNeedle(ease*pct);
    if(progress<1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

function restart(){
  idx=0;correct=0;wrong=0;answered={};wrongLog={};fcShown=false;mcOpts=[];
  deck=shuffle([...QA]);updateStats();render();
}

deck=shuffle([...QA]);
render();
</script>
</body>
</html>
